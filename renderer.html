<template id="prompt-tpl">Tomá el texto que te voy a pasar y reescribilo como una documentación larga, clara y navegable.

## Objetivo

Que el resultado mantenga la naturaleza de texto largo, pero más escaneable, más claro, más compacto y mejor editado. Sin componentes visuales especiales ni bloques custom. Solo markdown bien usado.

## Qué tenés que hacer

- Resumí y reorganizá el texto.
- Conservá los conceptos, patrones, nombres y relaciones importantes.
- Recortá redundancias, repeticiones y desarrollos innecesarios.
- No resumas de más, pero tampoco lo hagas innecesariamente largo.
- Ordená el contenido con una progresión lógica.
- Agregá una introducción breve que funcione como resumen inicial dentro de la primera página.
- Agregá una conclusión obligatoria que cierre y sintetice bien.
- Agregá ejemplos naturales de la vida real cuando ayuden a entender conceptos abstractos o densos.

## Regla de longitud

- Priorizá una compresión editorial natural.
- Recortá reformulaciones equivalentes, transiciones innecesarias y párrafos que repitan la misma idea.
- Si una idea ya quedó clara, no la vuelvas a desarrollar sin aportar algo nuevo.
- No desarrolles todas las secciones con la misma profundidad: expandí las ideas centrales y comprimí las secundarias.
- Cuando dudes entre desarrollar más o comprimir mejor, priorizá comprimir sin perder conceptos clave.
- Evitá extenderte solo por prolijidad estructural.
- No agregues secciones, subsecciones o bloques extra si no mejoran claramente la comprensión.

## Reglas de estilo

- Escribí como documentación clara para leer, no como apuntes sueltos.
- Priorizá claridad, fluidez y buena sintaxis.
- Evitá tono excesivamente académico o rebuscado.
- No agregues relleno.
- El cuerpo principal debe seguir siendo prosa, pero no abuses de párrafos largos.

## Títulos y navegación

- Los títulos deben ser cortos, claros y escaneables (idealmente 3–6 palabras).
- Evitá títulos excesivamente largos, abstractos o cargados.

## Uso de markdown

Usá markdown no solo para formatear, sino para mejorar la lectura.

Priorizá:
- **negritas** para conceptos clave
- listas cuando ayuden a sintetizar, comparar o separar ideas
- tablas cuando compriman mejor que un párrafo
- blockquotes para frases o ideas importantes
- ejemplos separados visualmente cuando aporten claridad

Evitá:
- bloques muy largos de texto corrido
- usar listas por decorar
- convertir todo en bullets
- recursos de markdown que no reduzcan densidad ni mejoren comprensión

## Reglas de balance

- Mantené el formato de texto largo, pero con mejor respiración visual.
- No dejes más de 2 o 3 párrafos seguidos sin un corte útil: subtítulo, lista, tabla, cita o ejemplo.
- En secciones abstractas, incluí al menos un ejemplo concreto.
- Si una comparación se entiende mejor en tabla, usá tabla. Si una idea se entiende mejor en lista, usá lista. Si una idea necesita desarrollo, usá prosa.
- No sacrifiques compresión por estructura.

## Estructura de salida

Usá `# H1` para dividir el documento en páginas. Cada H1 genera una entrada en el sidebar de navegación izquierdo. **No incluyas una sección de índice** — se genera automáticamente a partir de los H1.

Jerarquía:
- `# H1` → página (usá entre 3 y 6 en total, según la longitud del tema)
- `## H2` → sección dentro de la página (aparece en el TOC lateral derecho)
- `### H3` → subsección, solo si hay 2+ sub-temas claramente distintos

Estructura obligatoria:
- Primera página: `# [Título del documento]` — introducción y resumen inicial como secciones `## H2`
- Páginas de contenido: una `# H1` por cada grupo temático principal
- Última página: `# Conclusión`

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
'use strict';

/* ============================================================
   UTILITIES
   ============================================================ */
function slugify(s) {
  return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'page';
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ============================================================
   SMART PAGE DETECTION
   ============================================================ */

// Returns a copy of md with fenced code block contents removed.
// Used only for heading detection — original md is preserved for rendering.
function stripCodeBlocks(md) {
  return md
    .replace(/^```[^\n]*\n[\s\S]*?^```[ \t]*$/gm, '')
    .replace(/^~~~[^\n]*\n[\s\S]*?^~~~[ \t]*$/gm, '');
}

// Splits md at lines starting with prefix (e.g. '# ' or '## '),
// skipping any occurrences inside fenced code blocks.
function splitAtHeading(md, prefix) {
  var lines = md.split('\n');
  var inCode = false;
  var openFence = null;
  var parts = [];
  var current = [];

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var fenceMatch = line.match(/^(`{3,}|~{3,})/);
    if (fenceMatch && !inCode) {
      inCode = true;
      openFence = fenceMatch[1];
    } else if (inCode && fenceMatch && /^(`{3,}|~{3,})[ \t]*$/.test(line) && line.trimRight().startsWith(openFence)) {
      inCode = false;
      openFence = null;
    }
    if (!inCode && line.startsWith(prefix)) {
      if (current.length > 0) parts.push(current.join('\n'));
      current = [];
    }
    current.push(line);
  }
  if (current.length > 0) parts.push(current.join('\n'));
  return parts;
}

function detectSplitLevel(md) {
  var clean = stripCodeBlocks(md);
  var h1s = (clean.match(/^# [^\n]+/gm) || []).length;
  var h2s = (clean.match(/^## [^\n]+/gm) || []).length;
  if (h1s >= 2) return 'h1';
  if (h2s >= 2) return 'h2';
  return 'none';
}

function extractDocTitle(md) {
  var clean = stripCodeBlocks(md);
  var h1 = clean.match(/^# (.+)/m);
  if (h1) return h1[1].trim();
  var h2 = clean.match(/^## (.+)/m);
  if (h2) return h2[1].trim();
  var firstLine = clean.trim().split('\n')[0].replace(/^#+\s*/, '').trim();
  return firstLine.slice(0, 80) || 'Document';
}

function parsePagesAtH1(md) {
  var parts = splitAtHeading(md, '# ');
  var pages = [];
  var idxMap = {};

  parts.forEach(function(part) {
    var trimmed = part.trim();
    if (!trimmed) return;
    if (/^# /.test(trimmed)) {
      var nl = trimmed.indexOf('\n');
      var title = (nl === -1 ? trimmed.slice(2) : trimmed.slice(2, nl)).trim();
      var content = nl === -1 ? '' : trimmed.slice(nl + 1).trim();
      var base = slugify(title);
      var slug = base;
      var n = 1;
      while (idxMap[slug]) { slug = base + '-' + (++n); }
      idxMap[slug] = true;
      pages.push({ title: title, slug: slug, content: content });
    } else {
      if (pages.length === 0) {
        pages.push({ title: 'Introduction', slug: 'intro', content: trimmed });
      }
    }
  });

  return pages.length > 0 ? pages : [{ title: 'Document', slug: 'document', content: md }];
}

function parsePagesAtH2(md, docTitle) {
  // Remove the first H1 line (it becomes docTitle, not a page)
  var withoutH1 = md.replace(/^# [^\n]+\n?/m, '').trim();

  // Separate any content before the first H2 (intro block after H1)
  // Use stripCodeBlocks so H2s inside code blocks don't affect the search index
  var firstH2Idx = stripCodeBlocks(withoutH1).search(/^## /m);
  var introContent = firstH2Idx > 0 ? withoutH1.slice(0, firstH2Idx).trim() : '';
  var mainContent = firstH2Idx >= 0 ? withoutH1.slice(firstH2Idx) : withoutH1;

  var pages = [];
  var idxMap = {};
  var docDescription = '';

  // Decide whether introContent is a short sidebar description or a full intro page.
  // Description: no H3+ headings AND stripped text < 500 chars.
  // Intro page: long or has sub-headings.
  if (introContent) {
    var strippedIntro = introContent.replace(/^[-_*]{3,}$/gm, '').replace(/\s+/g, ' ').trim();
    var hasDeepHeadings = /^#{3,}/m.test(introContent);
    if (!hasDeepHeadings && strippedIntro.length < 500) {
      docDescription = introContent; // becomes sidebar description, not a page
    } else {
      var introSlug = slugify(docTitle) || 'intro';
      pages.push({ title: docTitle, slug: introSlug, content: introContent });
      idxMap[introSlug] = true;
    }
  }

  // Split at H2 boundaries — each H2 becomes a page (code-block-aware split)
  var parts = splitAtHeading(mainContent, '## ');
  parts.forEach(function(part) {
    var trimmed = part.trim();
    if (!trimmed) return;
    if (/^## /.test(trimmed)) {
      var nl = trimmed.indexOf('\n');
      var title = (nl === -1 ? trimmed.slice(3) : trimmed.slice(3, nl)).trim();
      var content = nl === -1 ? '' : trimmed.slice(nl + 1).trim();
      var base = slugify(title);
      var slug = base;
      var n = 1;
      while (idxMap[slug]) { slug = base + '-' + (++n); }
      idxMap[slug] = true;
      pages.push({ title: title, slug: slug, content: content });
    }
  });

  var fallback = pages.length > 0 ? pages : [{ title: docTitle, slug: slugify(docTitle) || 'document', content: md }];
  return { pages: fallback, docDescription: docDescription };
}

function smartParsePages(md) {
  var level = detectSplitLevel(md);
  var docTitle = extractDocTitle(md);

  if (level === 'h1') {
    return { pages: parsePagesAtH1(md), docTitle: docTitle, docDescription: '', splitLevel: 'h1' };
  } else if (level === 'h2') {
    var result = parsePagesAtH2(md, docTitle);
    return { pages: result.pages, docTitle: docTitle, docDescription: result.docDescription, splitLevel: 'h2' };
  } else {
    // Single page: strip the H1 line (its text becomes the title display via page-title)
    var content = md.replace(/^# [^\n]+\n?/m, '').trim() || md;
    var slug = slugify(docTitle);
    return { pages: [{ title: docTitle, slug: slug || 'document', content: content }], docTitle: docTitle, docDescription: '', splitLevel: 'none' };
  }
}

/* ============================================================
   BUILD DOC-SECTIONS FROM RENDERED HTML
   sectionTag: 'H2' for h1-split mode, 'H3' for h2-split mode
   ============================================================ */
function buildSections(htmlStr, pageSlug, sectionTag) {
  var tag = (sectionTag || 'H2').toUpperCase();
  var tagLow = tag.toLowerCase();
  var div = document.createElement('div');
  div.innerHTML = htmlStr;

  var sections = [];
  var current = null;
  var idx = 0;

  Array.from(div.children).forEach(function(el) {
    if (el.tagName === tag) {
      if (current) sections.push(current);
      var id = pageSlug + '-s' + (++idx);
      current = {
        id: id,
        headingHTML: '<' + tagLow + ' id="' + id + '">' + el.innerHTML + '</' + tagLow + '>',
        contentHTML: ''
      };
    } else {
      if (!current) {
        current = { id: pageSlug + '-s0', headingHTML: '', contentHTML: '' };
      }
      current.contentHTML += el.outerHTML;
    }
  });

  if (current) sections.push(current);
  return sections;
}

/* ============================================================
   FONT LINKS for generated HTML HEAD
   ============================================================ */
function buildFontLinks(fontPreset) {
  if (fontPreset === 'classic' || fontPreset === 'system') return [];
  var preconn = [
    '<link rel="preconnect" href="https://fonts.googleapis.com">',
    '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
  ];
  if (fontPreset === 'clean') {
    return preconn.concat(['<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">']);
  }
  // editorial (default)
  return preconn.concat(['<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">']);
}

/* ============================================================
   HTML GENERATION
   ============================================================ */
function buildHTML(pages, docTitle, splitLevel, fontPreset, docDescription, rawMd) {
  /* ---- Left nav ---- */
  var navHTML = pages.map(function(page, i) {
    var cls = i === 0 ? 'nav-item active' : 'nav-item';
    return '<a class="' + cls + '" data-page="' + page.slug + '">' + esc(page.title) + '</a>';
  }).join('');

  /* ---- Sidebar description ---- */
  var descHTML = '';
  if (docDescription) {
    var descParsed = marked.parse(docDescription).replace(/<hr\s*\/?>/gi, '');
    descHTML = '  <div class="doc-description">' + descParsed + '</div>';
  }

  /* ---- Pages ---- */
  var pagesHTML = pages.map(function(page, i) {
    return buildPage(page, i, pages, splitLevel, docTitle);
  }).join('\n');

  /* ---- JS init ---- */
  var firstSlug = pages[0].slug;
  var sectionTag = splitLevel === 'h2' ? 'h3' : 'h2';

  return [
    '<!DOCTYPE html>',
    '<html lang="en">',
    '<head>',
    '<meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
    '<title>' + esc(docTitle) + ' \u2014 Cognitiva.</title>',
  ].concat(buildFontLinks(fontPreset)).concat([
    '<style>' + templateCSS(fontPreset) + '</style>',
    '</head>',
    '<body>',
    '',
    '<button class="sidebar-reopen" id="sidebar-reopen" onclick="toggleSidebar()">',
    '  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,3 11,8 6,13"/></svg>',
    '</button>',
    '',
    '<div class="layout">',
    '',
    '<!-- LEFT SIDEBAR -->',
    '<aside class="sidebar-left" id="sidebar-left"><div class="sidebar-inner">',
    '  <div class="brand">',
    '    <span class="brand-name">Cognitiva<span class="brand-dot">.</span></span>',
    '    <button class="sidebar-toggle" onclick="toggleSidebar()">',
    '      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>',
    '    </button>',
    '  </div>',
    '  <div class="doc-identity">',
    '    <div class="doc-identity-title">' + esc(docTitle) + '</div>',
    '  </div>',
    descHTML,
    '  <nav class="sidebar-nav"><div class="nav-section">' + navHTML + '</div></nav>',
    '  <div class="sidebar-footer">',
    '    <button class="copy-md-btn" id="copy-md-btn" onclick="copyMarkdown()">Copy markdown</button>',
    '    <button class="back-to-editor" onclick="window.parent.postMessage(\'back\',\'*\')">← Editor</button>',
    '  </div>',
    '</div></aside>',
    '',
    '<!-- MAIN -->',
    '<main class="main" id="main"><div class="main-inner">',
    pagesHTML,
    '</div></main>',
    '',
    '<!-- RIGHT SIDEBAR -->',
    '<div class="sidebar-right-col">',
    '  <aside class="sidebar-right">',
    '    <div class="otp-label">On this page</div>',
    '    <nav id="on-this-page"></nav>',
    '  </aside>',
    '</div>',
    '',
    '</div><!-- /layout -->',
    '',
    '<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"><\/script>',
    '<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"><\/script>',
    '<script>',
    'var __rawMd=' + JSON.stringify(rawMd || '').replace(/<\/script/gi, '<\\/script') + ';',
    templateJS(firstSlug, sectionTag),
    '<\/script>',
    '</body>',
    '</html>'
  ]).join('\n');
}

function buildPage(page, i, pages, splitLevel, docTitle) {
  var isFirst = i === 0;
  var activeClass = isFirst ? ' active' : '';

  /* Eyebrow — first page always uses docTitle */
  var eyebrow = isFirst
    ? 'Cognitiva. \u00B7 ' + esc(docTitle)
    : (i < 10 ? '0' + i : '' + i) + ' \u2014 ' + esc(page.title);

  /* Parse markdown */
  var rawHTML = marked.parse(page.content || '');
  rawHTML = rawHTML
    .replace(/<table>/g, '<div class="table-wrap"><table>')
    .replace(/<\/table>/g, '</table></div>');

  /* Split into doc-sections at H2 (h1-split) or H3 (h2-split) */
  var sectionTag = splitLevel === 'h2' ? 'H3' : 'H2';
  var sections = buildSections(rawHTML, page.slug, sectionTag);
  var sectionsHTML = sections.length === 0
    ? '<div class="doc-section"><div class="prose"><p><em>No content.</em></p></div></div>'
    : sections.map(function(s) {
        return '<div class="doc-section">\n' +
          s.headingHTML + '\n' +
          '<div class="prose">' + s.contentHTML + '</div>\n' +
          '</div>';
      }).join('\n');

  /* Prev/Next */
  var prev = i > 0
    ? '<button class="page-nav-btn" onclick="switchPage(\'' + pages[i-1].slug + '\')">' +
      '<span class="page-nav-dir">\u2190 Previous</span>' +
      '<span class="page-nav-label">' + esc(pages[i-1].title) + '</span></button>'
    : '<div style="flex:1"></div>';

  var next = i < pages.length - 1
    ? '<button class="page-nav-btn next" onclick="switchPage(\'' + pages[i+1].slug + '\')">' +
      '<span class="page-nav-dir">Next \u2192</span>' +
      '<span class="page-nav-label">' + esc(pages[i+1].title) + '</span></button>'
    : '<div style="flex:1"></div>';

  return [
    '<div class="page' + activeClass + '" id="page-' + page.slug + '">',
    '<header class="page-header">',
    '  <div class="page-eyebrow">' + eyebrow + '</div>',
    '  <h1 class="page-title">' + esc(page.title) + '</h1>',
    '</header>',
    sectionsHTML,
    '<div class="page-nav">' + prev + next + '</div>',
    '</div>'
  ].join('\n');
}

/* ============================================================
   TEMPLATE JS — page switching, TOC, sidebar toggle
   sectionTag: 'h2' (h1-split) or 'h3' (h2-split)
   ============================================================ */
function templateJS(firstSlug, sectionTag) {
  sectionTag = sectionTag || 'h2';
  return (
    'var pages={};\n' +
    'document.querySelectorAll(".page").forEach(function(p){pages[p.id.replace("page-","")]=p;});\n' +

    'function switchPage(id){\n' +
    '  Object.values(pages).forEach(function(p){p.classList.remove("active");});\n' +
    '  document.querySelectorAll(".nav-item").forEach(function(a){a.classList.remove("active");});\n' +
    '  var page=pages[id];if(!page)return;\n' +
    '  page.classList.add("active");\n' +
    '  var nav=document.querySelector(\'[data-page="\'+id+\'"]\');\n' +
    '  if(nav)nav.classList.add("active");\n' +
    '  window.scrollTo({top:0,behavior:"instant"});\n' +
    '  buildTOC(id);\n' +
    '}\n' +

    'var tocObs=null;\n' +
    'function buildTOC(pid){\n' +
    '  var page=pages[pid],toc=document.getElementById("on-this-page");\n' +
    '  toc.innerHTML="";\n' +
    '  if(!page)return;\n' +
    '  var ind=document.createElement("div");ind.className="otp-indicator";toc.appendChild(ind);\n' +
    '  var hs=Array.from(page.querySelectorAll("' + sectionTag + '[id]"));\n' +
    '  hs.forEach(function(h){\n' +
    '    var a=document.createElement("a");a.href="#"+h.id;a.className="otp-link";\n' +
    '    a.textContent=h.textContent;\n' +
    '    a.addEventListener("click",function(e){e.preventDefault();h.scrollIntoView({behavior:"smooth",block:"start"});});\n' +
    '    toc.appendChild(a);\n' +
    '  });\n' +
    '  if(tocObs){tocObs.disconnect();tocObs=null;}\n' +
    '  if(!hs.length)return;\n' +
    '  var links=Array.from(toc.querySelectorAll(".otp-link")),vis=new Set();\n' +
    '  function mi(al){\n' +
    '    if(!al.length){ind.style.setProperty("--otp-height","0px");return;}\n' +
    '    var f=al[0],l=al[al.length-1];\n' +
    '    var t=f.offsetTop+parseFloat(getComputedStyle(f).paddingTop);\n' +
    '    var b=l.offsetTop+l.clientHeight-parseFloat(getComputedStyle(l).paddingBottom);\n' +
    '    ind.style.setProperty("--otp-top",t+"px");ind.style.setProperty("--otp-height",(b-t)+"px");\n' +
    '  }\n' +
    '  function ap(){\n' +
    '    var al;\n' +
    '    if(vis.size>0){\n' +
    '      links.forEach(function(l){l.classList.toggle("active",vis.has(l.getAttribute("href").slice(1)));});\n' +
    '      al=links.filter(function(l){return l.classList.contains("active");});\n' +
    '    }else{\n' +
    '      var passed=hs.filter(function(h){return h.getBoundingClientRect().top<=0;});\n' +
    '      var tgt=passed.length?passed[passed.length-1]:hs[0];\n' +
    '      links.forEach(function(l){l.classList.remove("active");});\n' +
    '      var m=links.find(function(l){return l.getAttribute("href")==="#"+tgt.id;});\n' +
    '      if(m)m.classList.add("active");al=m?[m]:[];\n' +
    '    }\n' +
    '    mi(al);\n' +
    '  }\n' +
    '  tocObs=new IntersectionObserver(function(en){\n' +
    '    en.forEach(function(e){if(e.isIntersecting)vis.add(e.target.id);else vis.delete(e.target.id);});\n' +
    '    ap();\n' +
    '  },{rootMargin:"0px 0px 0px 0px",threshold:0});\n' +
    '  hs.forEach(function(h){tocObs.observe(h);});ap();\n' +
    '}\n' +

    'document.querySelectorAll(".nav-item").forEach(function(a){\n' +
    '  a.addEventListener("click",function(e){e.preventDefault();switchPage(this.dataset.page);});\n' +
    '});\n' +

    'function toggleSidebar(){\n' +
    '  var s=document.getElementById("sidebar-left"),r=document.getElementById("sidebar-reopen");\n' +
    '  var open=!s.classList.contains("closed");\n' +
    '  if(open){s.classList.remove("is-opening");s.classList.add("is-closing","closed");r.style.display="flex";}\n' +
    '  else{s.classList.remove("is-closing");s.classList.add("is-opening");s.classList.remove("closed");r.style.display="none";}\n' +
    '}\n' +

    'function copyMarkdown(){\n' +
    '  var btn=document.getElementById("copy-md-btn");\n' +
    '  var orig=btn.textContent;\n' +
    '  var done=function(){btn.textContent="Copiado \u2713";setTimeout(function(){btn.textContent=orig;},2000);};\n' +
    '  if(navigator.clipboard){navigator.clipboard.writeText(__rawMd).then(done).catch(done);}\n' +
    '  else{var ta=document.createElement("textarea");ta.value=__rawMd;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();}\n' +
    '}\n' +

    'document.getElementById("sidebar-reopen").style.display="none";\n' +
    'buildTOC("' + firstSlug + '");\n'
  );
}

/* ============================================================
   APP ACTIONS
   ============================================================ */
var _html = '';

function toggleSettings() {
  var panel = document.getElementById('settings-panel');
  var btn = document.getElementById('settings-btn');
  var isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  btn.style.color = isOpen ? '' : 'var(--ink)';
}

function renderDoc() {
  var md = document.getElementById('md-input').value.trim();
  if (!md) { alert('Paste some markdown first.'); return; }

  var result = smartParsePages(md);
  var checked = document.querySelector('[name="font-preset"]:checked');
  var fontPreset = checked ? checked.value : 'clean';
  _html = buildHTML(result.pages, result.docTitle, result.splitLevel, fontPreset, result.docDescription || '', md);

  var frame = document.getElementById('preview-frame');
  frame.srcdoc = _html;

  document.getElementById('editor').style.display = 'none';
  document.getElementById('preview').style.display = 'flex';
}

function backToEditor() {
  document.getElementById('preview').style.display = 'none';
  document.getElementById('editor').style.display = 'flex';
}

window.addEventListener('message', function(e) {
  if (e.data === 'back') backToEditor();
});

/* ============================================================
   COPY PROMPT
   ============================================================ */
function copyPrompt() {
  var text = document.getElementById('prompt-tpl').innerHTML
    .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').trim();
  var btn = document.getElementById('copy-prompt-btn');

  function done() {
    var orig = btn.textContent;
    btn.textContent = 'Copiado ✓';
    setTimeout(function() { btn.textContent = orig; }, 2000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done);
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta); done();
  }
}

// Keyboard shortcut: Cmd+Enter to render
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    if (document.getElementById('editor').style.display !== 'none') renderDoc();
  }
});

'## What It Is\n' +

'\n' +
'### The scarcity logic\n' +
'\n' +

'\n' +

'### Platform incentives\n' +
'\n' +
'A platform whose revenue depends on time-on-screen has structural incentives to maximize that time, independent of whether that time is good for the user.\n' +

'## How It Works\n' +
'\n' +
'Platforms use a small set of psychological mechanisms to capture and sustain attention. These mechanisms are not accidental — they are deliberately designed and continuously optimized.\n' +
'\n' +
'### Variable rewards\n' +
'\n' +
'The most powerful mechanism is the **variable reward schedule** — the same principle that makes slot machines addictive. When rewards are unpredictable, the behavior that seeks them becomes compulsive.\n' +
'\n' +
'In a feed, the "reward" is a piece of content that is interesting, funny, or emotionally resonant. Because you cannot predict which scroll will deliver it, you keep scrolling. The ratio of interesting to uninteresting content is carefully tuned — too high and the behavior extinguishes; too low and users leave.\n' +
'\n' +
'### Social validation loops\n' +
'\n' +
'Likes, follower counts, and view metrics create a **status feedback loop**. Posting content triggers an anxious wait for validation. The notification that arrives is the reward.\n' +
'\n' +
'This loop is particularly effective because it ties platform engagement to social identity. Leaving the platform means losing access to the status signals you have accumulated.\n' +
'\n' +
'### Infinite scroll\n' +
'\n' +
'Before infinite scroll, pagination created natural stopping points. Reaching the end of a page was a moment of decision: do I continue?\n' +
'\n' +
'Infinite scroll eliminates those moments. The content never ends, so the question "should I stop?" never arises naturally. The user must impose their own stopping point — against a system specifically designed to prevent them from finding one.\n' +
'\n' +
'## The Real Cost\n' +
'\n' +
'The effects of sustained attention-harvesting design are measurable across multiple dimensions.\n' +
'\n' +
'### Cognitive effects\n' +
'\n' +
'| Effect | Evidence |\n' +
'|--------|----------|\n' +
'| Reduced attention span | Average focus time dropped from 12s (2000) to 8s (2015) |\n' +
'| Weakened deep reading | Sustained reading comprehension declines with habitual scanning |\n' +
'| Impaired memory encoding | Constant interruption prevents consolidation of long-term memories |\n' +
'| Increased task-switching cost | Frequent context shifts reduce efficiency on focused work |\n' +
'\n' +
'The mechanism is well understood: **deep work requires sustained attention**. A cognitive environment optimized for interruption is one that makes deep work structurally harder.\n' +

'### Mental health effects\n' +
'\n' +

'The more useful frame is not "does social media cause depression?" but "does this design pattern serve its users?" On that question, the evidence is fairly clear.\n' +
'\n' +
'## Design Principles\n' +
'\n' +
'Building software that respects attention requires deliberate choices at every level of the product. These principles are not idealistic — they are practical responses to the mechanisms described above.\n' +
'\n' +
'### Finite feeds\n' +
'\n' +
'Replace infinite scroll with paginated, bounded content. A feed that ends gives users a natural decision point and a sense of completion.\n' +
'\n' +
'**Example —** The Kindle app shows reading progress as a percentage and a time-remaining estimate. This small change transforms a potentially endless activity into one with a visible finish line — which makes users *more* likely to return, not less.\n' +

'### No unread counts\n' +
'\n' +

'```js\n' +

'```\n' +

'\n' +
'### Explicit time signals\n' +
'\n' +
'Show users how long they have been in a session. Not as a dark pattern designed to trigger guilt, but as a neutral, accurate signal that lets them make an informed decision.\n' +

'\n' +
